<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000008">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-title" content="Clock">
  <meta name="apple-touch-fullscreen" content="yes">
  <title>Clock</title>
  <link rel="stylesheet" href="style.css?v=2">
  <style>
    /*
     * CRITICAL iOS safe-area fix:
     * Only the <html> background bleeds into safe areas on iOS.
     * Set it to match the darkest edge of the wallpaper.
     * Do NOT use position:fixed or overflow:hidden on body — it breaks safe area rendering.
     */
    html,body {
      background-color: #000008 !important;
    }
  </style>
</head>
<body>

  <!-- WALLPAPER — lives outside all screens so it's never clipped -->
  <div id="wallpaper"></div>

  <!-- SCREEN 1 — PIN PAD -->
  <div id="screen-pin">
    <div id="pin-top">
      <div id="pin-title">Enter Passcode</div>
      <div id="pin-dots">
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
      </div>
    </div>
    <div id="pin-grid">
      <div class="pin-btn" data-num="1">1</div>
      <div class="pin-btn" data-num="2">2</div>
      <div class="pin-btn" data-num="3">3</div>
      <div class="pin-btn" data-num="4">4</div>
      <div class="pin-btn" data-num="5">5</div>
      <div class="pin-btn" data-num="6">6</div>
      <div class="pin-btn" data-num="7">7</div>
      <div class="pin-btn" data-num="8">8</div>
      <div class="pin-btn" data-num="9">9</div>
      <div class="pin-btn empty"></div>
      <div class="pin-btn" data-num="0">0</div>
      <div class="pin-btn empty"></div>
    </div>
  </div>

  <!-- SCREEN 2 — HOME SCREEN -->
  <div id="screen-home">

    <!-- STATUS BAR -->
    <div id="status-bar">
      <div id="status-right">
        <svg width="22" height="16" viewBox="0 0 19 12">
          <rect x="0" y="8.5" width="3.5" height="3.5" rx="0.8" fill="white"/>
          <rect x="4.5" y="6" width="3.5" height="6" rx="0.8" fill="white"/>
          <rect x="9" y="3.5" width="3.5" height="8.5" rx="0.8" fill="white"/>
          <rect x="13.5" y="0" width="3.5" height="12" rx="0.8" fill="white"/>
        </svg>
        <svg width="20" height="16" viewBox="0 0 16 13" fill="none">
          <path d="M8 10.5 L6.2 8.5 A2.6 2.6 0 0 1 9.8 8.5 Z" fill="white"/>
          <path d="M4.2 6.8 A5.5 5.5 0 0 1 11.8 6.8" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M1.5 4.2 A9.5 9.5 0 0 1 14.5 4.2" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
        <svg width="32" height="16" viewBox="0 0 28 14" fill="none">
          <rect x="0.5" y="0.5" width="24" height="13" rx="3.5" stroke="white" stroke-opacity="0.55"/>
          <rect x="2" y="2" width="18" height="10" rx="2" fill="white"/>
          <path d="M26 4.5v5a2.5 2.5 0 000-5z" fill="white" fill-opacity="0.55"/>
        </svg>
      </div>
    </div>

    <!-- DATE AND TIME -->
    <div id="clock-wrap">
      <div id="clock-date">Monday, June 10</div>
      <div id="clock-time">9:41</div>
    </div>

    <div id="spacer"></div>

    <!-- BOTTOM BUTTONS -->
    <div id="bottom-bar">
      <div id="torch-btn">
        <svg width="20" height="26" viewBox="0 0 20 34" fill="white">
          <!-- head top flat -->
          <rect x="2" y="0" width="16" height="3" rx="1.5" fill="white"/>
          <!-- trapezoid body top -->
          <path d="M2 3 L4 10 L16 10 L18 3 Z" fill="white"/>
          <!-- handle body -->
          <rect x="5" y="10" width="10" height="18" rx="2" fill="white"/>
          <!-- button on handle -->
          <rect x="8" y="16" width="4" height="4" rx="1" fill="#000"/>
          <!-- bottom cap -->
          <rect x="5" y="28" width="10" height="4" rx="2" fill="white"/>
        </svg>
      </div>
      <div id="camera-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
    </div>

    <div id="home-indicator"></div>

  </div>

  <!-- SCREEN 3 — SECRET PANEL -->
  <div id="screen-secret">
    <div id="secret-inner">

      <div class="secret-title">⚙ Settings</div>

      <div class="settings-section">
        <div class="section-title">Display Settings</div>
        <div class="secret-row">
          <label>Wallpaper</label>
          <select id="wallpaper-select">
            <option value="ios">Deep Space</option>
            <option value="sunset">Sunset</option>
            <option value="gradient1">Deep Purple</option>
            <option value="gradient2">Midnight Blue</option>
            <option value="gradient3">Dark Green</option>
            <option value="gradient4">Deep Red</option>
            <option value="gradient5">Pure Black</option>
            <option value="gradient6">Ocean Blue</option>
            <option value="gradient7">Dark Ember</option>
            <option value="custom">Custom Photo</option>
          </select>
        </div>

        <div class="secret-row" id="gallery-row" style="display:none">
          <label>Choose Photo</label>
          <input type="file" id="gallery-input" accept="image/*"
            style="display:none"/>
          <button id="gallery-btn">Open Gallery</button>
        </div>
        <div class="secret-row">
          <label>Clock Color</label>
          <select id="clock-color">
            <option value="#ffffff">White</option>
            <option value="#f59e0b">Gold</option>
            <option value="#22c55e">Green</option>
            <option value="#8b5cf6">Purple</option>
            <option value="#38bdf8">Blue</option>
            <option value="#f472b6">Pink</option>
          </select>
        </div>
        <div class="secret-row">
          <label>Clock Size</label>
          <select id="clock-size">
            <option value="72px">Small</option>
            <option value="88px" selected>Medium</option>
            <option value="104px">Large</option>
          </select>
        </div>
      </div>

      <div class="settings-section">
        <div class="section-title">Performance Settings</div>
        <div class="secret-row">
          <label>Time Direction</label>
          <select id="tap-direction">
            <option value="backward">Backward</option>
            <option value="forward">Forward</option>
          </select>
        </div>
        <div class="secret-row">
          <label>Unit</label>
          <select id="tap-unit">
            <option value="minutes">Minutes</option>
            <option value="hours">Hours</option>
          </select>
        </div>
        <div class="secret-row">
          <label>Roll Speed</label>
          <select id="anim-speed">
            <option value="slow">Slow</option>
            <option value="medium" selected>Medium</option>
            <option value="fast">Fast</option>
          </select>
        </div>
        <div class="secret-row">
          <label>Trigger</label>
          <select id="trigger-type">
            <option value="tap">Tap</option>
            <option value="tap-vibrate">Tap + Vibrate</option>
          </select>
        </div>
      </div>

      <div id="status-text">Not set</div>
      <div style="text-align: center; color: #555; font-size: 11px; margin: 4px 0 12px; font-family: sans-serif;">v2.0</div>
      <button id="close-secret-btn">Close Settings</button>

    </div>
  </div>

  <script src="script.js?v=2"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js')
    .then(() => console.log('Service Worker Registered'));
}
</script>

</body>
</html>
